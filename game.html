<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECTOR ZERO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050508;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: min(800px, 100vw, calc(100vh * 800/600));
    height: auto;
    aspect-ratio: 800/600;
    cursor: crosshair;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 10;
    opacity: 0.55;
  }
</style>
</head>
<body>
<div class="scanlines"></div>
<canvas id="c"></canvas>
<script>
'use strict';

const W = 800, H = 600;
const CYAN   = '#00f5c4';
const RED    = '#ff4e6a';
const PURPLE = '#b44ff7';
const BG     = '#050508';
const TC     = '#c0c0d0';
const DIM    = '#555570';
const LINE   = '#2a2a4a';

const LEVELS = [
  {
    num: 1, title: 'SECTOR 01',
    waves: [
      [{type:'grunt', count:5, delay:1.2}],
      [{type:'grunt', count:8, delay:0.9}]
    ],
    stats: {
      grunt:     {speed:85,  health:1, dmg:20, score:10, radius:12},
      zigzagger: {speed:130, health:1, dmg:15, score:20, radius:10}
    }
  },
  {
    num: 2, title: 'SECTOR 02',
    waves: [
      [{type:'grunt', count:6, delay:1.0}, {type:'zigzagger', count:3, delay:2.2}],
      [{type:'grunt', count:10, delay:0.7}, {type:'zigzagger', count:5, delay:1.5}]
    ],
    stats: {
      grunt:     {speed:105, health:1, dmg:20, score:10, radius:12},
      zigzagger: {speed:155, health:1, dmg:20, score:25, radius:10}
    }
  },
  {
    num: 3, title: 'SECTOR 03',
    waves: [
      [{type:'grunt', count:8, delay:0.8}],
      [{type:'zigzagger', count:8, delay:1.0}],
      [{type:'grunt', count:10, delay:0.5}, {type:'zigzagger', count:8, delay:0.8}]
    ],
    stats: {
      grunt:     {speed:125, health:2, dmg:25, score:15, radius:12},
      zigzagger: {speed:185, health:1, dmg:25, score:30, radius:10}
    }
  }
];

// ── Canvas ─────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = W;
canvas.height = H;
ctx.imageSmoothingEnabled = false;

// ── State ──────────────────────────────────────────────────────
let gameState = 'MENU';
let currentLevel = 1;
let score = 0;
let totalTime = 0;

let player, bullets, enemies, particles, shake;
let spawnSchedule, spawnTime, spawnerDone, waveIndex, wavePauseTimer;

// ── Input ──────────────────────────────────────────────────────
const keys  = {};
const mouse = { x: W/2, y: H/2, down: false };

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (e.key === 'Enter' || e.key === ' ') handleAction();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top)  * (H / r.height);
});
canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  mouse.down = true;
  if (gameState !== 'PLAYING') handleAction();
});
canvas.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; });

function handleAction() {
  if      (gameState === 'MENU')           startGame();
  else if (gameState === 'LEVEL_COMPLETE') nextLevel();
  else if (gameState === 'GAME_OVER')      goMenu();
  else if (gameState === 'WIN')            goMenu();
}

// ── Utilities ──────────────────────────────────────────────────
function circlesOverlap(a, b) {
  const dx = a.x-b.x, dy = a.y-b.y, r = a.radius+b.radius;
  return dx*dx + dy*dy < r*r;
}
function rand(min, max) { return min + Math.random()*(max-min); }
function triggerShake(i) { shake.intensity = Math.max(shake.intensity, i); shake.duration = 0.25; }

// ── Setup ──────────────────────────────────────────────────────
function createPlayer() {
  return { x:W/2, y:H/2, radius:14, speed:210, health:100, maxHealth:100,
           angle:0, shootCooldown:0, shootRate:0.22, iframes:0, iframeDuration:0.8, muzzleFlash:0 };
}

function goMenu() { gameState='MENU'; score=0; currentLevel=1; }

function startGame() {
  score=0; currentLevel=1;
  player = createPlayer();
  startLevel(1);
}

function startLevel(n) {
  currentLevel=n;
  bullets=[]; enemies=[]; particles=[];
  shake={ intensity:0, duration:0 };
  player.x=W/2; player.y=H/2;
  player.iframes=1.0;
  gameState='PLAYING';
  startWave(0);
}

function nextLevel() {
  if (currentLevel >= LEVELS.length) { gameState='WIN'; return; }
  startLevel(currentLevel+1);
}

function buildWaveSchedule(groups) {
  const items=[];
  for (const g of groups) {
    let t=0.5;
    for (let i=0; i<g.count; i++) { items.push({type:g.type, spawnAt:t}); t+=g.delay; }
  }
  return items.sort((a,b)=>a.spawnAt-b.spawnAt);
}

function startWave(wi) {
  waveIndex=wi; spawnTime=0; spawnerDone=false; wavePauseTimer=0;
  spawnSchedule = buildWaveSchedule(LEVELS[currentLevel-1].waves[wi]);
}

function spawnEnemy(type) {
  const s=LEVELS[currentLevel-1].stats[type];
  const edge=Math.floor(Math.random()*4), m=28;
  let x,y;
  if      (edge===0){x=rand(0,W); y=-m;}
  else if (edge===1){x=W+m;       y=rand(0,H);}
  else if (edge===2){x=rand(0,W); y=H+m;}
  else              {x=-m;        y=rand(0,H);}
  enemies.push({ type, x, y, radius:s.radius, speed:s.speed, health:s.health, maxHealth:s.health,
                 score:s.score, angle:0, walkTimer:rand(0,Math.PI*2), zigTime:rand(0,Math.PI*2) });
}

function fireBullet() {
  bullets.push({ x:player.x+Math.cos(player.angle)*24, y:player.y+Math.sin(player.angle)*24,
                 vx:Math.cos(player.angle)*630, vy:Math.sin(player.angle)*630, radius:4, life:1.6 });
  player.muzzleFlash=0.09; player.shootCooldown=player.shootRate;
}

function spawnParticles(e) {
  const color = e.type==='grunt' ? RED : PURPLE;
  for (let i=0; i<10; i++) {
    const a=rand(0,Math.PI*2), s=rand(60,160), life=rand(0.35,0.7);
    particles.push({ x:e.x, y:e.y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
                     life, maxLife:life, color, radius:rand(2,4), isSquare:e.type==='grunt' });
  }
}

// ── Update ─────────────────────────────────────────────────────
function update(dt) {
  totalTime += dt;
  if (gameState !== 'PLAYING') return;

  // Player movement
  let dx=0, dy=0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx-=1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx+=1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy-=1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy+=1;
  if (dx&&dy){dx*=0.7071;dy*=0.7071;}
  player.x = Math.max(player.radius, Math.min(W-player.radius, player.x+dx*player.speed*dt));
  player.y = Math.max(player.radius, Math.min(H-player.radius, player.y+dy*player.speed*dt));

  player.angle = Math.atan2(mouse.y-player.y, mouse.x-player.x);
  player.shootCooldown -= dt;
  player.muzzleFlash   -= dt;
  if (mouse.down && player.shootCooldown<=0) fireBullet();
  if (player.iframes>0) player.iframes-=dt;

  // Bullets
  for (let i=bullets.length-1; i>=0; i--) {
    const b=bullets[i];
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    if (b.life<=0||b.x<-30||b.x>W+30||b.y<-30||b.y>H+30) bullets.splice(i,1);
  }

  // Spawner
  if (!spawnerDone) {
    spawnTime+=dt;
    while (spawnSchedule.length>0 && spawnTime>=spawnSchedule[0].spawnAt) {
      spawnEnemy(spawnSchedule.shift().type);
    }
    if (spawnSchedule.length===0) spawnerDone=true;
  }

  // Enemies
  for (let i=enemies.length-1; i>=0; i--) {
    const e=enemies[i];
    const ax=player.x-e.x, ay=player.y-e.y;
    const dist=Math.sqrt(ax*ax+ay*ay)||0.001;
    e.angle=Math.atan2(ay,ax);
    e.walkTimer+=dt;
    if (e.type==='grunt') {
      e.x+=(ax/dist)*e.speed*dt;
      e.y+=(ay/dist)*e.speed*dt;
    } else {
      e.zigTime+=dt;
      const perp=e.angle+Math.PI/2;
      const zoff=Math.sin(e.zigTime*3.5)*55;
      e.x+=(ax/dist)*e.speed*dt+Math.cos(perp)*zoff*dt;
      e.y+=(ay/dist)*e.speed*dt+Math.sin(perp)*zoff*dt;
    }
  }

  // Bullet × Enemy
  outer: for (let bi=bullets.length-1; bi>=0; bi--) {
    for (let ei=enemies.length-1; ei>=0; ei--) {
      if (circlesOverlap(bullets[bi], enemies[ei])) {
        enemies[ei].health--;
        bullets.splice(bi,1);
        if (enemies[ei].health<=0) {
          score+=enemies[ei].score;
          spawnParticles(enemies[ei]);
          triggerShake(3);
          enemies.splice(ei,1);
        }
        continue outer;
      }
    }
  }

  // Enemy × Player
  if (player.iframes<=0) {
    for (const e of enemies) {
      if (circlesOverlap(player,e)) {
        player.health -= LEVELS[currentLevel-1].stats[e.type].dmg;
        player.iframes = player.iframeDuration;
        triggerShake(9);
        if (player.health<=0) { player.health=0; gameState='GAME_OVER'; return; }
        break;
      }
    }
  }

  // Particles
  for (let i=particles.length-1; i>=0; i--) {
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.92; p.vy*=0.92; p.life-=dt;
    if (p.life<=0) particles.splice(i,1);
  }

  if (shake.duration>0) shake.duration-=dt;

  // Wave/level completion
  if (spawnerDone && enemies.length===0) {
    wavePauseTimer+=dt;
    if (wavePauseTimer>=1.8) {
      wavePauseTimer=0;
      const level=LEVELS[currentLevel-1];
      if (waveIndex+1<level.waves.length) {
        startWave(waveIndex+1);
      } else {
        gameState = currentLevel>=LEVELS.length ? 'WIN' : 'LEVEL_COMPLETE';
      }
    }
  }
}

// ── Draw helpers ───────────────────────────────────────────────
function drawGrid() {
  ctx.strokeStyle=LINE; ctx.lineWidth=1; ctx.globalAlpha=0.45;
  for (let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for (let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.globalAlpha=1;
}

function drawVignette() {
  const g=ctx.createRadialGradient(W/2,H/2,W*0.22,W/2,H/2,W*0.85);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.65)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

function drawPlayer() {
  if (player.iframes>0 && Math.floor(player.iframes*10)%2===0) return;
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);

  // gun barrel
  ctx.fillStyle='#005544';
  ctx.fillRect(4,-3,22,6);
  ctx.fillStyle=CYAN;
  ctx.fillRect(5,-2,20,4);

  // body
  ctx.fillStyle=CYAN;
  ctx.fillRect(-12,-12,24,24);
  ctx.strokeStyle='#003d33';
  ctx.lineWidth=2;
  ctx.strokeRect(-12,-12,24,24);

  // eyes
  ctx.fillStyle='#001a15';
  ctx.fillRect(-9,-7,5,5);
  ctx.fillRect(4,-7,5,5);

  // muzzle flash
  if (player.muzzleFlash>0) {
    ctx.globalAlpha=Math.max(0,player.muzzleFlash/0.09);
    ctx.fillStyle='#ffffa0';
    ctx.beginPath(); ctx.arc(26,0,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(26,0,4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  if (e.type==='grunt') {
    const leg=Math.sin(e.walkTimer*8)*3;
    ctx.fillStyle='#aa1133';
    ctx.fillRect(-9,9,6,Math.max(1,5+leg));
    ctx.fillRect(3,9,6,Math.max(1,5-leg));
    ctx.fillStyle=RED;
    ctx.fillRect(-10,-10,20,20);
    ctx.strokeStyle='#7a0020';ctx.lineWidth=2;
    ctx.strokeRect(-10,-10,20,20);
    ctx.fillStyle='#ffffff';
    ctx.fillRect(-7,-6,5,4); ctx.fillRect(2,-6,5,4);
    ctx.fillStyle='#220000';
    ctx.fillRect(-6,-5,3,2); ctx.fillRect(3,-5,3,2);
    if (e.maxHealth>1) {
      const bw=24;
      ctx.fillStyle='#330000'; ctx.fillRect(-bw/2,-17,bw,4);
      ctx.fillStyle=RED;       ctx.fillRect(-bw/2,-17,bw*(e.health/e.maxHealth),4);
    }
  } else {
    const pulse=1+Math.sin(e.zigTime*6)*0.1;
    ctx.rotate(Math.PI/4); ctx.scale(pulse,pulse);
    ctx.fillStyle=PURPLE;
    ctx.fillRect(-9,-9,18,18);
    ctx.strokeStyle='#5a0099';ctx.lineWidth=2;
    ctx.strokeRect(-9,-9,18,18);
    ctx.fillStyle='#e0aaff';
    ctx.fillRect(-4,-4,8,8);
  }
  ctx.restore();
}

function drawBullet(b) {
  const tx=b.x-(b.vx/630)*12, ty=b.y-(b.vy/630)*12;
  const g=ctx.createLinearGradient(tx,ty,b.x,b.y);
  g.addColorStop(0,'rgba(255,255,160,0)');
  g.addColorStop(1,'rgba(255,255,160,0.75)');
  ctx.strokeStyle=g; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(b.x,b.y); ctx.stroke();
  ctx.fillStyle='#ffffa0';
  ctx.beginPath(); ctx.arc(b.x,b.y,b.radius,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.arc(b.x,b.y,2,0,Math.PI*2); ctx.fill();
}

function drawParticle(p) {
  ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
  ctx.fillStyle=p.color;
  if (p.isSquare) {
    ctx.fillRect(p.x-p.radius,p.y-p.radius,p.radius*2,p.radius*2);
  } else {
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(Math.PI/4);
    ctx.fillRect(-p.radius,-p.radius,p.radius*2,p.radius*2);
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

// ── HUD ────────────────────────────────────────────────────────
function drawHUD() {
  if (gameState!=='PLAYING') return;
  const level=LEVELS[currentLevel-1];

  ctx.font='13px "Share Tech Mono"';
  ctx.fillStyle=DIM; ctx.textAlign='left';
  ctx.fillText(`${level.title}  ·  WAVE ${waveIndex+1}/${level.waves.length}`, 16, 26);

  const bw=190, bh=11, bx=16, by=35;
  ctx.fillStyle='#0d1a18'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=CYAN;
  ctx.fillRect(bx,by,Math.max(0,bw*(player.health/player.maxHealth)),bh);
  ctx.strokeStyle=LINE; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  ctx.font='10px "Share Tech Mono"'; ctx.fillStyle=DIM;
  ctx.fillText(`HP ${player.health}/${player.maxHealth}`, bx, by+bh+13);

  ctx.font='26px "Bebas Neue"'; ctx.textAlign='right';
  ctx.shadowColor=CYAN; ctx.shadowBlur=10;
  ctx.fillStyle=TC; ctx.fillText(String(score).padStart(6,'0'), W-16, 36);
  ctx.shadowBlur=0;
  ctx.font='10px "Share Tech Mono"'; ctx.fillStyle=DIM;
  ctx.fillText('SCORE', W-16, 48);
  ctx.textAlign='left';

  // Next wave incoming indicator
  if (spawnerDone && enemies.length===0 && waveIndex+1<level.waves.length) {
    if (Math.sin(totalTime*4)>0) {
      ctx.font='18px "Bebas Neue"'; ctx.textAlign='center';
      ctx.fillStyle='#ffe566';
      ctx.fillText(`WAVE ${waveIndex+2} INCOMING`, W/2, H/2-30);
      ctx.textAlign='left';
    }
  }
}

// ── Overlay screens ────────────────────────────────────────────
function drawOverlay(title, titleColor, lines) {
  ctx.fillStyle='rgba(5,5,8,0.84)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='70px "Bebas Neue"'; ctx.shadowColor=titleColor; ctx.shadowBlur=28;
  ctx.fillStyle=titleColor; ctx.fillText(title, W/2, H/2-44);
  ctx.shadowBlur=0;
  lines.forEach((l,i)=>{
    ctx.font = i===0 ? '16px "Share Tech Mono"' : '12px "Share Tech Mono"';
    ctx.fillStyle = i===0 ? TC : DIM;
    ctx.fillText(l, W/2, H/2+14+i*26);
  });
  if (Math.sin(totalTime*3)>0) {
    ctx.font='13px "Bebas Neue"'; ctx.fillStyle=DIM;
    ctx.fillText('PRESS ENTER OR CLICK TO CONTINUE', W/2, H/2+110);
  }
  ctx.textAlign='left';
}

// ── Menu ───────────────────────────────────────────────────────
function drawMenu() {
  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
  drawGrid(); drawVignette();

  // floating player silhouette
  ctx.save();
  ctx.translate(W/2, H/2+18);
  ctx.rotate(totalTime*0.25);
  ctx.scale(2.8,2.8);
  ctx.globalAlpha=0.07;
  ctx.fillStyle=CYAN; ctx.fillRect(-12,-12,24,24);
  ctx.globalAlpha=1;
  ctx.restore();

  ctx.textAlign='center';
  ctx.font='90px "Bebas Neue"'; ctx.shadowColor=CYAN; ctx.shadowBlur=35;
  ctx.fillStyle=TC; ctx.fillText('SECTOR', W/2, H/2-55);
  ctx.fillStyle=CYAN; ctx.fillText('ZERO', W/2, H/2+16);
  ctx.shadowBlur=0;

  ctx.font='12px "Share Tech Mono"'; ctx.fillStyle=DIM;
  ctx.fillText('TOP-DOWN ASSAULT  ·  3 SECTORS  ·  SURVIVE', W/2, H/2+48);
  ctx.fillText('MOVE: ARROWS / WASD     AIM: MOUSE     SHOOT: HOLD CLICK', W/2, H/2+74);

  if (Math.sin(totalTime*3)>0) {
    ctx.font='15px "Bebas Neue"'; ctx.fillStyle=TC;
    ctx.fillText('PRESS ENTER OR CLICK TO BEGIN', W/2, H/2+112);
  }
  ctx.textAlign='left';
}

// ── Main render ────────────────────────────────────────────────
function render() {
  ctx.clearRect(0,0,W,H);
  if (gameState==='MENU') { drawMenu(); return; }

  ctx.save();
  if (shake.duration>0 && gameState==='PLAYING') {
    ctx.translate(rand(-1,1)*shake.intensity, rand(-1,1)*shake.intensity);
  }
  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
  drawGrid();
  particles.forEach(drawParticle);
  bullets.forEach(drawBullet);
  enemies.forEach(drawEnemy);
  drawPlayer();
  drawVignette();
  ctx.restore();

  drawHUD();
  if (gameState==='LEVEL_COMPLETE') {
    const level=LEVELS[currentLevel-1];
    drawOverlay(`${level.title} CLEAR`, CYAN,
      [`SCORE  ${String(score).padStart(6,'0')}`, `SECTOR ${currentLevel+1} INCOMING`]);
  }
  if (gameState==='GAME_OVER') {
    drawOverlay('GAME OVER', RED,
      [`FINAL SCORE  ${String(score).padStart(6,'0')}`, 'RETURN TO MAIN MENU']);
  }
  if (gameState==='WIN') {
    drawOverlay('MISSION COMPLETE', CYAN,
      [`FINAL SCORE  ${String(score).padStart(6,'0')}`, 'ALL SECTORS CLEARED']);
  }
}

// ── Loop ───────────────────────────────────────────────────────
let lastTime=0;
function gameLoop(ts) {
  const dt=Math.min((ts-lastTime)/1000, 0.05);
  lastTime=ts;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
