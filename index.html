<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIC TAC TOE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050508;
    --grid: #1a1a2e;
    --line: #2a2a4a;
    --x-color: #00f5c4;
    --o-color: #ff4e6a;
    --x-glow: rgba(0, 245, 196, 0.4);
    --o-glow: rgba(255, 78, 106, 0.4);
    --text: #c0c0d0;
    --dim: #555570;
    --win-bg: rgba(255, 255, 255, 0.03);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(42, 42, 74, 0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(42, 42, 74, 0.3) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial glow center */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(0, 245, 196, 0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    padding: 24px;
  }

  /* Header */
  .header {
    text-align: center;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 8vw, 72px);
    letter-spacing: 0.15em;
    color: var(--text);
    line-height: 1;
    text-shadow: 0 0 40px rgba(192, 192, 208, 0.15);
  }

  .title span.x-letter { color: var(--x-color); text-shadow: 0 0 20px var(--x-glow); }
  .title span.o-letter { color: var(--o-color); text-shadow: 0 0 20px var(--o-glow); }

  .subtitle {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Turn indicator */
  .status {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--dim);
    min-height: 32px;
    transition: all 0.3s ease;
  }

  .player-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border: 2px solid currentColor;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0;
    border-radius: 4px;
    transition: all 0.3s ease;
  }

  .player-badge.x { color: var(--x-color); box-shadow: 0 0 12px var(--x-glow), inset 0 0 12px rgba(0, 245, 196, 0.05); }
  .player-badge.o { color: var(--o-color); box-shadow: 0 0 12px var(--o-glow), inset 0 0 12px rgba(255, 78, 106, 0.05); }

  .status-text { font-size: 12px; letter-spacing: 0.25em; }

  /* Board */
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    position: relative;
  }

  .cell {
    width: clamp(90px, 22vw, 130px);
    height: clamp(90px, 22vw, 130px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    z-index: 2;
    transition: background 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    border: 0 solid var(--line);
  }

  /* Right border for cols 0,1 */
  .cell:nth-child(3n+1),
  .cell:nth-child(3n+2) { border-right-width: 2px; }

  /* Bottom border for rows 0,1 */
  .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(3),
  .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) { border-bottom-width: 2px; }

  .cell:hover:not(.filled):not(.game-over) {
    background: rgba(255,255,255,0.02);
  }

  .cell:hover:not(.filled):not(.game-over) .ghost {
    opacity: 0.18;
  }

  .ghost {
    position: absolute;
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(50px, 11vw, 76px);
    line-height: 1;
  }

  /* Cell marks */
  .mark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(50px, 11vw, 76px);
    line-height: 1;
    opacity: 0;
    transform: scale(0.4) rotate(-10deg);
    transition: opacity 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  .cell.filled .mark {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }

  .mark.x {
    color: var(--x-color);
    text-shadow: 0 0 20px var(--x-glow), 0 0 40px rgba(0, 245, 196, 0.2);
  }

  .mark.o {
    color: var(--o-color);
    text-shadow: 0 0 20px var(--o-glow), 0 0 40px rgba(255, 78, 106, 0.2);
  }

  /* Winning cell highlight */
  .cell.winning {
    background: var(--win-bg);
    animation: winPulse 1.2s ease-in-out infinite alternate;
  }

  .cell.winning .mark.x {
    text-shadow: 0 0 30px var(--x-glow), 0 0 60px var(--x-glow), 0 0 80px rgba(0, 245, 196, 0.3);
    animation: markGlowX 0.8s ease-in-out infinite alternate;
  }

  .cell.winning .mark.o {
    text-shadow: 0 0 30px var(--o-glow), 0 0 60px var(--o-glow), 0 0 80px rgba(255, 78, 106, 0.3);
    animation: markGlowO 0.8s ease-in-out infinite alternate;
  }

  @keyframes winPulse {
    from { background: rgba(255,255,255,0.01); }
    to   { background: rgba(255,255,255,0.05); }
  }

  @keyframes markGlowX {
    from { text-shadow: 0 0 20px var(--x-glow), 0 0 40px rgba(0, 245, 196, 0.2); }
    to   { text-shadow: 0 0 40px var(--x-glow), 0 0 80px var(--x-glow), 0 0 120px rgba(0, 245, 196, 0.3); }
  }

  @keyframes markGlowO {
    from { text-shadow: 0 0 20px var(--o-glow), 0 0 40px rgba(255, 78, 106, 0.2); }
    to   { text-shadow: 0 0 40px var(--o-glow), 0 0 80px var(--o-glow), 0 0 120px rgba(255, 78, 106, 0.3); }
  }

  .game-over .cell:not(.winning):not(.filled) {
    opacity: 0.3;
  }
  .game-over .cell.filled:not(.winning) {
    opacity: 0.4;
  }

  /* Score */
  .scoreboard {
    display: flex;
    gap: 0;
    border: 1px solid var(--line);
    overflow: hidden;
    border-radius: 6px;
  }

  .score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 24px;
    gap: 4px;
    min-width: 70px;
  }

  .score-item + .score-item {
    border-left: 1px solid var(--line);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--dim);
  }

  .score-label.x { color: var(--x-color); }
  .score-label.o { color: var(--o-color); }

  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
    letter-spacing: 0.05em;
  }

  .score-num.x { color: var(--x-color); text-shadow: 0 0 12px var(--x-glow); }
  .score-num.o { color: var(--o-color); text-shadow: 0 0 12px var(--o-glow); }
  .score-num.draw { color: var(--dim); }

  /* Restart button */
  .restart-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    padding: 10px 28px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .restart-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s ease;
  }

  .restart-btn:hover {
    border-color: var(--text);
    color: var(--text);
  }

  .restart-btn:hover::before {
    background: rgba(255,255,255,0.03);
  }

  .restart-btn:active {
    transform: scale(0.97);
  }

  /* Scanline overlay */
  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0, 0, 0, 0.08) 3px,
      rgba(0, 0, 0, 0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
    opacity: 0.6;
  }

  /* Entrance animation */
  .container { animation: fadeUp 0.5s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .board { animation: fadeUp 0.5s 0.15s ease both; }
  .scoreboard { animation: fadeUp 0.5s 0.25s ease both; }
  .restart-btn { animation: fadeUp 0.5s 0.35s ease both; }
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="container">
  <div class="header">
    <div class="title">TIC<span class="x-letter">X</span>TAC<span class="o-letter">O</span>TOE</div>
    <div class="subtitle">two player — local</div>
  </div>

  <div class="status" id="status">
    <div class="player-badge x" id="badge">X</div>
    <span class="status-text" id="status-text">PLAYER TURN</span>
  </div>

  <div class="board" id="board"></div>

  <div class="scoreboard">
    <div class="score-item">
      <span class="score-label x">PLAYER X</span>
      <span class="score-num x" id="score-x">0</span>
    </div>
    <div class="score-item">
      <span class="score-label">DRAWS</span>
      <span class="score-num draw" id="score-d">0</span>
    </div>
    <div class="score-item">
      <span class="score-label o">PLAYER O</span>
      <span class="score-num o" id="score-o">0</span>
    </div>
  </div>

  <button class="restart-btn" id="restart">[ RESTART ]</button>
</div>

<script>
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let board, current, gameOver, scores;

  function init() {
    board = Array(9).fill(null);
    current = 'X';
    gameOver = false;
    renderBoard();
    updateStatus(false, null);
    document.getElementById('board').classList.remove('game-over');
  }

  function initFull() {
    scores = { X: 0, O: 0, D: 0 };
    updateScores();
    init();
  }

  function renderBoard() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    board.forEach((val, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (val ? ' filled' : '');
      cell.dataset.i = i;

      // Ghost preview
      const ghost = document.createElement('span');
      ghost.className = 'ghost';
      ghost.textContent = current;
      ghost.style.color = current === 'X' ? 'var(--x-color)' : 'var(--o-color)';
      cell.appendChild(ghost);

      // Mark
      const mark = document.createElement('span');
      mark.className = 'mark' + (val ? ` ${val.toLowerCase()}` : '');
      mark.textContent = val || '';
      cell.appendChild(mark);

      cell.addEventListener('click', () => handleClick(i));
      el.appendChild(cell);
    });
  }

  function handleClick(i) {
    if (gameOver || board[i]) return;
    board[i] = current;

    const winLine = getWinner();
    if (winLine) {
      gameOver = true;
      scores[current]++;
      updateScores();
      renderBoard();
      markWinners(winLine);
      updateStatus(true, current, false);
      document.getElementById('board').classList.add('game-over');
    } else if (board.every(v => v)) {
      gameOver = true;
      scores.D++;
      updateScores();
      renderBoard();
      updateStatus(false, null, true);
      document.getElementById('board').classList.add('game-over');
    } else {
      current = current === 'X' ? 'O' : 'X';
      renderBoard();
      updateStatus(false, null, false);
    }
  }

  function getWinner() {
    for (const line of WINS) {
      const [a, b, c] = line;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) return line;
    }
    return null;
  }

  function markWinners(line) {
    const cells = document.getElementById('board').children;
    line.forEach(i => cells[i].classList.add('winning'));
  }

  function updateStatus(won, winner, draw) {
    const badge = document.getElementById('badge');
    const text = document.getElementById('status-text');
    if (won) {
      badge.textContent = winner;
      badge.className = `player-badge ${winner.toLowerCase()}`;
      text.textContent = 'WINS!';
    } else if (draw) {
      badge.textContent = '—';
      badge.className = 'player-badge';
      badge.style.color = 'var(--dim)';
      badge.style.boxShadow = 'none';
      text.textContent = 'DRAW';
    } else {
      badge.textContent = current;
      badge.className = `player-badge ${current.toLowerCase()}`;
      badge.style.color = '';
      badge.style.boxShadow = '';
      text.textContent = 'PLAYER TURN';
    }
    // Update ghost color on rerender
    document.querySelectorAll('.ghost').forEach(g => {
      g.textContent = current;
      g.style.color = current === 'X' ? 'var(--x-color)' : 'var(--o-color)';
    });
  }

  function updateScores() {
    document.getElementById('score-x').textContent = scores.X;
    document.getElementById('score-o').textContent = scores.O;
    document.getElementById('score-d').textContent = scores.D;
  }

  document.getElementById('restart').addEventListener('click', init);

  initFull();
</script>
</body>
</html>
